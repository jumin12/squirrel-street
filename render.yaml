# Web service: use repo root so index.html, art/, dictionary.js are deployed with the API.
services:
  - type: web
    name: squirrel-street
    runtime: node
    plan: free
    rootDir: .
    # Repo root has package.json so Render's default "npm install" succeeds (cwd is .../project/src).
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
